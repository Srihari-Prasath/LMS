{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-book-half text-primary" style="font-size: 3rem;"></i>
            <h2 class="mt-2 fw-bold">ALMS</h2>
            <p class="text-muted">Advanced Library Management System</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required autofocus>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
                <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>
        </form>

        <div class="text-center mt-3">
            <span class="text-muted">Don't have an account?</span>
            <a href="{{ url_for('auth.register') }}" class="text-decoration-none">Register here</a>
        </div>

        <div class="text-center mt-4">
            <small class="text-muted">
                Demo: admin@lms.com / admin123 | student1@lms.com / student123
            </small>
        </div>
    </div>
</div>
{% endblock %}
